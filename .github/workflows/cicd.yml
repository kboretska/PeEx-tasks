name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Validation & Build Stage
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8 (Test Stage)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Build Docker Image
        run: docker build -t ghcr.io/kboretska/peex-tasks:latest .

  # 2. Deploy to Development
  deploy-dev:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Deploy to AWS Dev via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_DEV_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          script: |
            # echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/kboretska/peex-tasks:latest
            docker stop load-app || true
            docker rm load-app || true
            docker run -d -p 5000:5000 --name load-app ghcr.io/kboretska/peex-tasks:latest

  # 3. Deploy to Production (with Promotion Logic)
  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Prod
        run: echo "Deploying to Production environment (Simulated on port 80)"
