name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate, Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Run lint
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: |
          PYTHONPATH=. pytest -v

      - name: Build Docker image for validation
        run: |
          docker build -t peex-tasks:test .

  build-and-push:
    name: Build and Push Artifact
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_name: ${{ steps.image_name.outputs.image_name }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: GHCR image name (lowercase, required by registry)
        id: image_name
        run: echo "image_name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        env:
          IMAGE_NAME: ${{ steps.image_name.outputs.image_name }}
        run: |
          docker build \
            -t "${IMAGE_NAME}:latest" \
            -t "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Push Docker images
        env:
          IMAGE_NAME: ${{ steps.image_name.outputs.image_name }}
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"

  deploy-azure:
    name: Deploy to Azure VM
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: azure

    steps:
      - name: Deploy via SSH (pull from GHCR, run container)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: azureuser
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            TOKEN='${{ secrets.GHCR_READ_TOKEN }}'
            if [ -z "$TOKEN" ]; then TOKEN='${{ secrets.GITHUB_TOKEN }}'; fi
            echo "$TOKEN" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            IMAGE="${{ needs.build-and-push.outputs.image_name }}:${{ needs.build-and-push.outputs.image_tag }}"
            sudo docker pull "$IMAGE"
            sudo docker stop peex-app || true
            sudo docker rm peex-app || true
            sudo docker run -d \
              --name peex-app \
              --restart unless-stopped \
              -p 5000:5000 \
              "$IMAGE"

  smoke-test-azure:
    name: Smoke test Azure VM
    if: github.event_name == 'push'
    needs: deploy-azure
    runs-on: ubuntu-latest
    environment: azure

    steps:
      - name: Check /health on VM
        run: |
          curl --fail --retry 5 --retry-delay 5 --retry-all-errors \
            "http://${{ secrets.AZURE_VM_HOST }}:5000/health"
